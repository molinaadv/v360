# Tema dark na raiz do Streamlit (garante fundo/texto/widgets escuros mesmo
# antes do CSS custom carregar). Cores = tokens do painel de TV.
[theme]
base = "dark"
primaryColor = "#5b8cff"
backgroundColor = "#0b1220"
secondaryBackgroundColor = "#141d2e"
textColor = "#f2f6ff"

[client]
showSidebarNavigation = false
